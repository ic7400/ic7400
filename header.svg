<svg xmlns="http://www.w3.org/2000/svg" width="860" height="220" viewBox="0 0 860 220">
  <defs>
    <style>
      @keyframes gradshift {
        0%  {stop-color:#ff6ec7}
        20% {stop-color:#ffdd57}
        40% {stop-color:#00ffee}
        60% {stop-color:#7b57ff}
        80% {stop-color:#ff6ec7}
        100%{stop-color:#ff6ec7}
      }
      @keyframes gradshift2 {
        0%  {stop-color:#ffdd57}
        20% {stop-color:#00ffee}
        40% {stop-color:#7b57ff}
        60% {stop-color:#ff6ec7}
        80% {stop-color:#ffdd57}
        100%{stop-color:#ffdd57}
      }
      @keyframes gradshift3 {
        0%  {stop-color:#00ffee}
        20% {stop-color:#7b57ff}
        40% {stop-color:#ff6ec7}
        60% {stop-color:#ffdd57}
        80% {stop-color:#00ffee}
        100%{stop-color:#00ffee}
      }
      @keyframes gradshift4 {
        0%  {stop-color:#7b57ff}
        20% {stop-color:#ff6ec7}
        40% {stop-color:#ffdd57}
        60% {stop-color:#00ffee}
        80% {stop-color:#7b57ff}
        100%{stop-color:#7b57ff}
      }

      .ascii text { font-family: monospace; font-size: 13.5px; fill: url(#cg); }
      
      .s0 { animation: gradshift  4s linear infinite; }
      .s1 { animation: gradshift2 4s linear infinite; }
      .s2 { animation: gradshift3 4s linear infinite; }
      .s3 { animation: gradshift4 4s linear infinite; }
    </style>
    
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop class="s0" offset="0%"  />
      <stop class="s1" offset="33%" />
      <stop class="s2" offset="66%" />
      <stop class="s3" offset="100%"/>
    </linearGradient>
    
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,255,238,.3)" stroke-width=".4"/>
    </pattern>
  </defs>

  <rect width="860" height="220" fill="#000000"/>

  <rect width="860" height="220" fill="url(#grid)" opacity="0.3"/>

  <line x1="30" y1="110" x2="830" y2="110" stroke="url(#cg)" stroke-width=".8" opacity=".3"/>

  <g class="ascii" transform="translate(0, 32)" text-anchor="middle">
