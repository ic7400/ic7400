<svg xmlns="http://www.w3.org/2000/svg" width="860" height="220" viewBox="0 0 860 220">
  <defs>
    <style>
      @keyframes huerot { 0%{filter:hue-rotate(0deg) brightness(1.4)} 100%{filter:hue-rotate(360deg) brightness(1.4)} }
      @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.35} 94%{opacity:1} 97.5%{opacity:1} 98%{opacity:.15} 99%{opacity:1} }
      @keyframes scanmove { 0%{transform:translateY(-40px)} 100%{transform:translateY(260px)} }
      @keyframes gridpulse { 0%,100%{opacity:.045} 50%{opacity:.12} }
      @keyframes linepulse { 0%,100%{opacity:.2} 50%{opacity:.7} }
      @keyframes cornerping { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.4)} }
      @keyframes tagblink { 0%,48%{opacity:.6} 50%,98%{opacity:0} 100%{opacity:.6} }
      @keyframes tagblink2 { 0%,48%{opacity:0} 50%,98%{opacity:.6} 100%{opacity:0} }
      @keyframes bordercolor { 0%{stroke:#ff6ec7} 25%{stroke:#ffdd57} 50%{stroke:#00ffee} 75%{stroke:#7b57ff} 100%{stroke:#ff6ec7} }
      @keyframes gradshift {
        0%  {stop-color:#ff6ec7}
        20% {stop-color:#ffdd57}
        40% {stop-color:#00ffee}
        60% {stop-color:#7b57ff}
        80% {stop-color:#ff6ec7}
        100%{stop-color:#ff6ec7}
      }
      @keyframes gradshift2 {
        0%  {stop-color:#ffdd57}
        20% {stop-color:#00ffee}
        40% {stop-color:#7b57ff}
        60% {stop-color:#ff6ec7}
        80% {stop-color:#ffdd57}
        100%{stop-color:#ffdd57}
      }
      @keyframes gradshift3 {
        0%  {stop-color:#00ffee}
        20% {stop-color:#7b57ff}
        40% {stop-color:#ff6ec7}
        60% {stop-color:#ffdd57}
        80% {stop-color:#00ffee}
        100%{stop-color:#00ffee}
      }
      @keyframes gradshift4 {
        0%  {stop-color:#7b57ff}
        20% {stop-color:#ff6ec7}
        40% {stop-color:#ffdd57}
        60% {stop-color:#00ffee}
        80% {stop-color:#7b57ff}
        100%{stop-color:#7b57ff}
      }
      @keyframes drift { 0%{transform:translate(0,0)} 25%{transform:translate(3px,-2px)} 50%{transform:translate(-2px,2px)} 75%{transform:translate(2px,3px)} 100%{transform:translate(0,0)} }
      @keyframes rgbsplit {
        0%,100%{filter:drop-shadow(2px 0 0 rgba(255,0,200,.7)) drop-shadow(-2px 0 0 rgba(0,255,238,.7))}
        50%{filter:drop-shadow(-3px 0 0 rgba(255,221,87,.7)) drop-shadow(3px 0 0 rgba(123,87,255,.7))}
      }
      .ascii { animation: flicker 7s infinite, drift 9s ease-in-out infinite, rgbsplit 1.1s ease-in-out infinite; }
      .ascii text { font-family: monospace; font-size: 13.5px; fill: url(#cg); }
      .scan { animation: scanmove 2.8s linear infinite; }
      .grid { animation: gridpulse 3s ease-in-out infinite; }
      .hline { animation: linepulse 2.2s ease-in-out infinite; }
      .tl { animation: cornerping 2s ease-in-out infinite 0s; transform-origin: 18px 18px; }
      .tr { animation: cornerping 2s ease-in-out infinite .5s; transform-origin: 842px 18px; }
      .bl { animation: cornerping 2s ease-in-out infinite 1s; transform-origin: 18px 202px; }
      .br { animation: cornerping 2s ease-in-out infinite 1.5s; transform-origin: 842px 202px; }
      .border { animation: bordercolor 3s linear infinite; fill:none; stroke-width:1.5; }
      .tag1 { animation: tagblink 4s step-end infinite; }
      .tag2 { animation: tagblink2 4s step-end infinite; }
      .s0 { animation: gradshift  4s linear infinite; }
      .s1 { animation: gradshift2 4s linear infinite; }
      .s2 { animation: gradshift3 4s linear infinite; }
      .s3 { animation: gradshift4 4s linear infinite; }
    </style>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop class="s0" offset="0%"  />
      <stop class="s1" offset="33%" />
      <stop class="s2" offset="66%" />
      <stop class="s3" offset="100%"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080b10"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,255,238,.5)" stroke-width=".4"/>
    </pattern>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(0,255,238,0)"/>
      <stop offset="50%"  stop-color="rgba(0,255,238,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,255,238,0)"/>
    </linearGradient>
  </defs>

  <rect width="860" height="220" rx="12" fill="url(#bg)"/>

  <rect class="grid" width="860" height="220" rx="12" fill="url(#grid)" opacity=".06"/>

  <g class="scan">
    <rect x="0" y="0" width="860" height="35" rx="0" fill="url(#scanGrad)" opacity="1"/>
  </g>

  <rect class="border" x="1" y="1" width="858" height="218" rx="11"/>

  <g class="tl">
    <line x1="10" y1="18" x2="28" y2="18" stroke="#ff6ec7" stroke-width="2"/>
    <line x1="10" y1="10" x2="10" y2="28" stroke="#ff6ec7" stroke-width="2"/>
  </g>
  <g class="tr">
    <line x1="832" y1="18" x2="850" y2="18" stroke="#ff6ec7" stroke-width="2"/>
    <line x1="850" y1="10" x2="850" y2="28" stroke="#ff6ec7" stroke-width="2"/>
  </g>
  <g class="bl">
    <line x1="10" y1="202" x2="28" y2="202" stroke="#ff6ec7" stroke-width="2"/>
    <line x1="10" y1="192" x2="10" y2="210" stroke="#ff6ec7" stroke-width="2"/>
  </g>
  <g class="br">
    <line x1="832" y1="202" x2="850" y2="202" stroke="#ff6ec7" stroke-width="2"/>
    <line x1="850" y1="192" x2="850" y2="210" stroke="#ff6ec7" stroke-width="2"/>
  </g>

  <text class="tag1" x="430" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,221,87,1)" letter-spacing="5">[ SYSTEM ONLINE ]</text>
  <text class="tag2" x="430" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,255,238,1)" letter-spacing="5">// ML_ENGINEER.exe //</text>

  <line class="hline" x1="30" y1="110" x2="830" y2="110" stroke="url(#cg)" stroke-width=".8" opacity=".3"/>

  <g class="ascii" transform="translate(22, 32)">
    <text y="18">██╗ ██████╗███████╗ ██╗██╗  ██╗ ██████╗  ██████╗</text>
    <text y="36">██║██╔════╝╚════██║██╔╝██║  ██║██╔═══██╗██╔═████╗</text>
    <text y="54">██║██║         ██╔╝██╔╝ ███████║██║   ██║██║██╔██║</text>
    <text y="72">██║██║        ██╔╝██╔╝  ╚════██║██║   ██║████╔╝██║</text>
    <text y="90">██║╚██████╗  ██╔╝██╔╝        ██║╚██████╔╝╚██████╔╝</text>
    <text y="108">╚═╝ ╚═════╝  ╚═╝ ╚═╝         ╚═╝ ╚═════╝  ╚═════╝</text>
  </g>

  <text x="430" y="192" text-anchor="middle" font-family="monospace" font-size="11" fill="url(#cg)" letter-spacing="3" opacity=".8">solving real problems using made-up languages</text>
</svg>
